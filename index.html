<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridbox Manager Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <nav class="sidebar">
        <div class="logo">GRIDBOX <span>CORE</span></div>
        <ul class="nav-links">
            <li class="active">📊 Dashboard</li>
            <li>📦 Mijn Vloot</li>
            <li>📜 Logs</li>
        </ul>
        <div class="user-info" id="user-display">Laden...</div>
        <button onclick="auth.signOut()" class="btn-logout">Uitloggen</button>
    </nav>

    <main class="content">
        <header>
            <h1>Systeem Overzicht</h1>
            <div id="status-summary">Systeem Status: <span class="online">ONLINE</span></div>
        </header>

        <section id="dashboard-content">
            <div class="loading-spinner">Boxen worden opgehaald uit Firestore...</div>
        </section>

        <section class="log-section">
            <h2>Laatste Activiteiten</h2>
            <div id="activity-log-container">
                </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
