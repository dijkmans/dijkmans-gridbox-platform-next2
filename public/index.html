<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>GRIDBOX CORE - Cloud Fix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .box-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .form-control { background: #334155; border: none; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="app" class="container mt-4">
        <h2 class="text-info mb-4">Gridbox Dashboard</h2>
        <div class="row">
            <div v-for="box in boxes" :key="box.id" class="col-md-4">
                <div class="box-card border-top border-info border-4">
                    <h4 class="text-info">{{ box.id }}</h4>
                    <p class="small text-muted">Status: {{ formatStatus(box.status) }}</p>
                    <button @click="openModal(box.id)" class="btn btn-info btn-sm w-100 fw-bold">DEEL & SMS VERSTUREN</button>
                </div>
            </div>
        </div>

        <div v-if="showModal" class="modal d-block" style="background: rgba(0,0,0,0.8);">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content bg-dark border-info p-4">
                    <h5>Nieuwe Toegang</h5>
                    <input v-model="s.phone" class="form-control" placeholder="+32487389473">
                    <input v-model="s.name" class="form-control" placeholder="Naam">
                    <input v-model="s.desc" class="form-control" placeholder="Omschrijving">
                    
                    <button @click="callCreateShare" class="btn btn-info w-100 fw-bold" :disabled="loading">
                        {{ loading ? 'Systeem koppelen...' : 'VERSTUUR NU' }}
                    </button>
                    <button @click="showModal = false" class="btn btn-link text-muted w-100">Annuleren</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

        const conf = { apiKey: "AIzaSyCmwIzuvHO4KW8qGMGlNFK4cnBzrVivtQE", authDomain: "gridbox-platform.firebaseapp.com", projectId: "gridbox-platform" };
        const app = initializeApp(conf);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const functions = getFunctions(app, "europe-west1");

        Vue.createApp({
            data() { return { boxes: [], showModal: false, activeBoxId: null, loading: false, s: { phone: '', name: '', desc: '' } } },
            mounted() {
                onAuthStateChanged(auth, u => {
                    if (u) {
                        onSnapshot(collection(db, "boxes"), s => {
                            this.boxes = s.docs.map(d => ({ id: d.id, ...d.data() }));
                        });
                    }
                });
            },
            methods: {
                formatStatus(s) { return typeof s === 'object' ? s.state : s; },
                openModal(id) { this.activeBoxId = id; this.showModal = true; },
                async callCreateShare() {
                    this.loading = true;
                    try {
                        const createShare = httpsCallable(functions, 'createShare');
                        // WE STUREN NU ZOWEL 'phone' ALS 'phoneNumber' OM DE REPLACE FOUT TE VOORKOMEN
                        await createShare({
                            boxId: this.activeBoxId,
                            phone: this.s.phone.trim(),
                            phoneNumber: this.s.phone.trim(), 
                            name: this.s.name,
                            description: this.s.desc
                        });
                        this.showModal = false;
                        alert("Succes! De Cloud Function heeft de share aangemaakt en de SMS getriggerd.");
                    } catch (e) {
                        alert("Fout in Cloud: " + e.message);
                    }
                    this.loading = false;
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
